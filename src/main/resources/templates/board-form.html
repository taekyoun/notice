<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${mode == 'edit' ? '글 수정' : '새 글 작성'} + ' | 사내 공지 포털'">글 작성 | 사내 공지 포털</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(255,255,255,.06);
      --text: #e8eefc;
      --muted: rgba(232,238,252,.70);
      --line: rgba(232,238,252,.14);
      --accent: #8ab4ff;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 16px;
      --max: 1100px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 450px at 10% -10%, rgba(138,180,255,.35), transparent 55%),
        radial-gradient(900px 450px at 90% 0%, rgba(110,231,183,.18), transparent 55%),
        var(--bg);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    .container { max-width: var(--max); margin: 0 auto; padding: 24px; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
      background: linear-gradient(to bottom, rgba(11,18,32,.85), rgba(11,18,32,.65));
      border-bottom: 1px solid var(--line);
    }
    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; }
    .logo {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, rgba(138,180,255,.95), rgba(110,231,183,.85));
      box-shadow: 0 10px 26px rgba(138,180,255,.18);
    }
    .menu { display: flex; gap: 10px; flex-wrap: wrap; }
    .chip {
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
      transition: .15s ease;
    }
    .chip:hover { transform: translateY(-1px); background: rgba(255,255,255,.07); color: var(--text); }
    .chip.primary { border-color: rgba(138,180,255,.35); color: var(--text); background: rgba(138,180,255,.10); }

    .panel {
      margin-top: 22px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-head {
      padding: 18px;
      border-bottom: 1px solid rgba(232,238,252,.10);
      background: rgba(255,255,255,.02);
    }
    .panel-head h1 { margin: 0; font-size: 22px; font-weight: 900; }
    .sub { margin-top: 6px; color: var(--muted); font-size: 13px; line-height: 1.5; }

    form { padding: 18px; display: grid; gap: 14px; }
    .row { display: grid; gap: 8px; }
    label { font-weight: 800; font-size: 13px; color: rgba(232,238,252,.9); }
    .input, .select, .textarea {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 12px;
      outline: none;
    }
    .textarea { min-height: 220px; resize: vertical; line-height: 1.7; }
    .help { color: var(--muted); font-size: 12px; line-height: 1.5; }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-top: 1px solid rgba(232,238,252,.10);
      background: rgba(255,255,255,.02);
    }
    .btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      font-weight: 900;
      cursor: pointer;
      transition: .15s ease;
    }
    .btn:hover { transform: translateY(-1px); background: rgba(255,255,255,.08); }
    .btn.accent { border-color: rgba(138,180,255,.45); background: rgba(138,180,255,.12); }
    .muted { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
<header class="nav">
  <div class="nav-inner">
    <a class="brand" th:href="@{/}">
      <span class="logo" aria-hidden="true"></span>
      <span>사내 공지 포털</span>
    </a>
    <nav class="menu" aria-label="주 메뉴">
      <a class="chip" th:href="@{/}">홈</a>
      <a class="chip primary" th:href="@{/boards}">게시판</a>
      <a class="chip" href="#" onclick="alert('추후: 부서/카테고리'); return false;">부서</a>
      <a class="chip" href="#" onclick="alert('추후: 관리자'); return false;">관리</a>
    </nav>
  </div>
</header>

<main class="container">
  <section class="panel">
    <header class="panel-head">
      <h1 th:text="${mode == 'edit' ? '글 수정' : '새 글 작성'}">새 글 작성</h1>
      <div class="sub">제목과 내용을 입력하고 저장하세요.</div>
    </header>

    <!-- mode = create: POST /boards
         mode = edit  : POST /boards/{id} + _method=put -->
    <form id="boardForm" th:object="${board}"
      th:attr="data-mode=${mode}, data-id=${board != null ? board.id : 0}">

      <div class="row">
        <label for="name">제목</label>
        <input id="name" name="name" class="input" type="text" th:field="*{name}" placeholder="예) 3월 정기 점검 일정 안내" required />
        <div class="help">게시판 목록에 표시되는 제목입니다.</div>
      </div>
<!-- 
      <div class="row">
        <label for="poster">작성자(부서/이름)</label>
        <input id="poster" name="poster" class="input" type="text" th:field="*{poster}" th:placeholder="${poster} " required />
      </div> -->

    

      <div class="row">
        <label for="content">내용</label>
        <textarea id="content" name="content" class="textarea" th:field="*{content}" placeholder="본문을 입력하세요" required></textarea>
      </div>

      <div class="actions">
        <div class="btns">
          <a class="btn" th:href="@{/boards}">취소</a>
          <button class="btn accent" type="submit" th:text="${mode == 'edit' ? '수정 저장' : '등록'}">등록</button>
        </div>

        <div class="muted" th:if="${mode == 'edit'}">
          수정 중: #<span th:text="${id}">0</span>
        </div>
        <div class="muted" th:if="${mode != 'edit'}">
          새 글 작성
        </div>
      </div>
    </form>

    <script>
        const form = document.getElementById('boardForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const mode = form.dataset.mode;     // create | edit
            const id = form.dataset.id;         // edit일 때 사용

            const formData = new FormData(form);


            const url = (mode === 'edit') ? `/boards/${id}` : `/boards`;
            const method = (mode === 'edit') ? 'PUT' : 'POST';
            const res = await fetch(url, {
                method: method,
                body: formData   // 헤더 지정하지 않음!
              })
            const redirectUrl = await res.text();
            location.href =redirectUrl;  
        });
    </script>
  </section>
</main>
</body>
</html>
