<!-- signup.html -->
<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원가입 | 사내 공지 포털</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: rgba(255,255,255,.06);
      --text: #e8eefc;
      --muted: rgba(232,238,252,.70);
      --line: rgba(232,238,252,.14);
      --accent: #8ab4ff;
      --ok: #6ee7b7;
      --warn: #fbbf24;
      --danger: #fb7185;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 16px;
      --radius2: 22px;
      --max: 1100px;
    }
    * { box-sizing: border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", Arial, "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 450px at 10% -10%, rgba(138,180,255,.35), transparent 55%),
        radial-gradient(900px 450px at 90% 0%, rgba(110,231,183,.18), transparent 55%),
        radial-gradient(900px 450px at 50% 110%, rgba(251,113,133,.12), transparent 60%),
        var(--bg);
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    .container { max-width: var(--max); margin: 0 auto; padding: 24px; }

    /* Nav */
    .nav {
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(14px);
      background: linear-gradient(to bottom, rgba(11,18,32,.85), rgba(11,18,32,.65));
      border-bottom: 1px solid var(--line);
    }
    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 14px 24px;
      display:flex; align-items:center; justify-content:space-between; gap:16px;
    }
    .brand { display:flex; align-items:center; gap:10px; font-weight:800; letter-spacing:.2px; }
    .logo {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(138,180,255,.95), rgba(110,231,183,.85));
      box-shadow: 0 10px 26px rgba(138,180,255,.18);
    }
    .menu { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .chip {
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      color: var(--muted);
      transition: .15s ease;
      font-weight: 600;
      font-size: 14px;
    }
    .chip:hover { transform: translateY(-1px); background: rgba(255,255,255,.07); color: var(--text); }
    .chip.primary { border-color: rgba(138,180,255,.35); color: var(--text); background: rgba(138,180,255,.10); }
    .chip.accent { border-color: rgba(138,180,255,.45); background: rgba(138,180,255,.12); color: var(--text); }
    .chip.accent:hover { background: rgba(138,180,255,.18); }

    /* Card */
    .wrap { display:grid; place-items:center; padding: 34px 0; }
    .card{
      width: min(640px, 100%);
      border-radius: var(--radius2);
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
      padding: 22px;
    }
    h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: -.2px; }
    .desc { margin: 0 0 16px; color: var(--muted); line-height: 1.6; font-size: 14px; }
    .grid { display:grid; gap: 10px; margin-top: 10px; }
    .two { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .label { font-size: 13px; color: var(--muted); font-weight: 700; }
    .input{
      width: 100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--text);
      outline: none;
    }
    .input::placeholder { color: rgba(232,238,252,.45); }
    .row { display:flex; align-items:center; justify-content:space-between; gap: 10px; flex-wrap:wrap; margin-top: 10px; }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap: 8px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      font-weight: 800;
      color: var(--text);
      cursor: pointer;
      transition: .15s ease;
    }
    .btn:hover { transform: translateY(-1px); background: rgba(255,255,255,.08); }
    .btn.accent { border-color: rgba(138,180,255,.45); background: rgba(138,180,255,.12); }
    .btn.accent:hover { background: rgba(138,180,255,.18); }
    .link { color: var(--accent); font-weight: 800; font-size: 13px; }
    .link:hover { text-decoration: underline; }

    .note {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    @media (max-width: 720px) { .two { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" th:href="@{/}">
        <span class="logo" aria-hidden="true"></span>
        <span>사내 공지 포털</span>
      </a>
      <nav class="menu" aria-label="주 메뉴">
        <a class="chip" th:href="@{/}">홈</a>
        <a class="chip" th:href="@{/boards}">게시판</a>
        <a class="chip" th:href="@{/login}">로그인</a>
        <a class="chip primary" th:href="@{/signup}">회원가입</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="wrap">
      <div class="card">
        <h1>회원가입</h1>
        <p class="desc">기본 계정 정보를 입력해 가입을 진행합니다. (추후 사내 이메일 인증/권한 정책 추가 가능)</p>

        <form class="grid" id="memberForm">
          <div class="two">
            <div class="grid">
              <div class="label">이름</div>
              <input class="input" type="text" name="name" placeholder="예) 엄태균" autocomplete="name" required />
            </div>
       
          </div>

          <div class="two">
            <div class="grid">
              <div class="label">아이디</div>
              <input class="input" type="text" name="username" placeholder="예) taekyoun" autocomplete="username" required />
            </div>
            <div class="grid">
              <div class="label">이메일</div>
              <input class="input" type="email" name="email" placeholder="예) taekyoun@company.com" autocomplete="email" required />
            </div>
          </div>

          <div class="two">
            <div class="grid">
              <div class="label">비밀번호</div>
              <input class="input" type="password" name="password" placeholder="비밀번호" autocomplete="new-password" required />
            </div>
            <div class="grid">
              <div class="label">비밀번호 확인</div>
              <input class="input" type="password" name="passwordConfirm" placeholder="비밀번호 확인" autocomplete="new-password" required />
            </div>
          </div>

          <div class="row">
            <button class="btn accent" type="submit">회원가입 →</button>
            <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
              <a class="link" th:href="@{/login}">이미 계정이 있어요(로그인)</a>
            </div>
          </div>
        </form>

        <div class="note">
          * 데모 UI. 서버 측에서 아이디/이메일 중복검사, 비밀번호 정책(길이/특수문자), 비밀번호 확인 일치 검증을 처리하세요.
        </div>
      </div>
    </section>


    
    <script>
        const form = document.getElementById('memberForm');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(form);


            fetch("/signup", {
                method: 'POST',
                body: formData   
            }).then((e) => {
                if(e.status=='201'){
                  alert('회원가입 되었습니다')
                  location.href='/'
                } 
            }); 
        });
    </script>
  </main>
</body>
</html>
